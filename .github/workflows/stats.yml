name: Generate GitHub Stats
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Stats SVG
        uses: cicirello/user-statistician@v1
        with:
          # This token allows the action to see your private Jii commits
          image-file: images/userstats.svg
          include-private: true 
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/userstats.svg
          git commit -m "Update GitHub statistics" || exit 0
          git push
